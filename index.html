<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cavaquinho - Treino de Acordes</title>
<style>
  body{background:#12181f;color:#f0f0f0;font-family:Segoe UI,Arial,sans-serif;text-align:center;margin:0;padding:20px}
  h1{color:#f7c948;margin-bottom:5px}
  .windows{display:flex;justify-content:center;gap:30px;flex-wrap:wrap;margin-top:20px}
  .box{background:#1e2733;border-radius:12px;padding:20px;width:260px;box-shadow:0 0 12px #000}
  .chord-name{font-size:60px;font-weight:bold;color:#4dd0e1}
  svg{background:#2a3646;border-radius:8px}
  .options{margin:25px auto;max-width:600px;background:#1e2733;border-radius:12px;padding:15px}
  .options label{display:inline-block;margin:6px 12px;font-size:15px;cursor:pointer}
  .btn{margin-top:15px;padding:10px 25px;font-size:16px;border:none;border-radius:8px;background:#4dd0e1;color:#12181f;cursor:pointer;font-weight:bold}
  .btn:hover{background:#3ab6c9}
  .gauge-wrap{margin:30px auto;width:220px}
  .gauge{position:relative;width:200px;height:200px;border-radius:50%;
    background:conic-gradient(#4dd0e1 0deg, #f7c948 180deg, #e74c3c 300deg);
    margin:0 auto;display:flex;align-items:center;justify-content:center}
  .gauge-inner{width:150px;height:150px;background:#12181f;border-radius:50%;
    display:flex;align-items:center;justify-content:center;flex-direction:column}
  .needle{position:absolute;width:4px;height:80px;background:#fff;top:20px;left:98px;
    transform-origin:bottom center;transition:transform .3s}
  input[type=range]{width:200px;margin-top:10px}
  #speedLabel{font-size:20px;font-weight:bold;color:#f7c948}
  .legend{font-size:12px;color:#9aa5b1;margin-top:6px}
</style>
</head>
<body>

<h1>🎵 Cavaquinho</h1>
<p>Treino de Transição de Acordes</p>

<div class="windows">
  <div class="box">
    <h3>Acorde</h3>
    <div class="chord-name" id="chordName">--</div>
  </div>
  <div class="box">
    <h3>Digitação (mão esquerda)</h3>
    <svg id="fretboard" width="200" height="240"></svg>
    <div class="legend">1=indicador 2=médio 3=anelar 4=mínimo · O=corda solta</div>
  </div>
</div>

<div class="options">
  <h3>Selecione as variações para treinar</h3>
  <label><input type="checkbox" class="qual" value="maj" checked> Maiores</label>
  <label><input type="checkbox" class="qual" value="min" checked> Menores</label>
  <label><input type="checkbox" class="qual" value="maj7" checked> Maiores com 7ª</label>
  <label><input type="checkbox" class="qual" value="min7" checked> Menores com 7ª</label>
  <br>
  <label><input type="checkbox" id="sharp" checked> Sustenidos (#)</label>
  <label><input type="checkbox" id="flat" checked> Bemóis (b)</label>
  <br>
  <button class="btn" id="startBtn">▶ Iniciar Treino</button>
  <button class="btn" id="stopBtn" style="background:#e74c3c">■ Parar</button>
</div>

<div class="gauge-wrap">
  <h3>Velocidade de Transição</h3>
  <div class="gauge">
    <div class="needle" id="needle"></div>
    <div class="gauge-inner">
      <span id="speedLabel">3.0s</span>
    </div>
  </div>
  <input type="range" id="speedSlider" min="500" max="6000" step="100" value="3000">
</div>
